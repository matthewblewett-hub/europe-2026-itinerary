<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Europe 2026 Itinerary</title>
    <meta name="description" content="Interactive Itinerary for Europe 2026 Trip">
    
    <!-- Web App / PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EuroTrip">
    <link rel="apple-touch-icon" href="assets/app-icon.png">
    <meta name="theme-color" content="#0d1b2a">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <div class="header-content">
                <h1>Europe 2026</h1>
                <p>Our Journey Awaits</p>
            </div>
            <div class="header-bg"></div>
        </header>

        <main id="itinerary-container" class="itinerary-list">
            <!-- Days will be dynamically injected here -->
        </main>
    </div>
    
    <!-- Modal for daily details -->
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Day Details</h2>
                <button class="close-btn" aria-label="Close modal">&times;</button>
            </div>
            <div class="modal-scroll-area">
                <div id="modal-body" class="timeline">
                    <!-- Timeline items injected here -->
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
