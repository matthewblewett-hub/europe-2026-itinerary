<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Europe 2026 Itinerary</title>
    <meta name="description" content="Interactive Itinerary for Europe 2026 Trip">

    <!-- Web App / PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EuroTrip">
    <link rel="apple-touch-icon" href="assets/app-icon.png">
    <meta name="theme-color" content="#0d1b2a" id="theme-color-meta">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div id="app">
        <header class="app-header">
            <div class="header-top-bar">
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle light/dark mode">
                    <i class="fas fa-sun" id="theme-icon"></i>
                </button>
            </div>
            <div class="header-content">
                <h1>Europe 2026</h1>
                <p>Our Journey Awaits</p>
            </div>
            <div class="header-bg"></div>
            <nav class="phase-tabs">
                <button class="phase-btn active" data-phase="phase1">Phase 1: Holland &amp; UK</button>
                <button class="phase-btn" data-phase="phase2">Phase 2: Cruise</button>
                <button class="phase-btn" data-phase="phase3">Phase 3: UK Camper</button>
            </nav>
        </header>

        <!-- Today Banner - shown when a day in the itinerary matches today -->
        <div id="today-banner" class="today-banner" style="display:none;" role="button" tabindex="0" aria-label="View today's itinerary">
            <div class="today-banner-inner">
                <div class="today-banner-left">
                    <div class="today-live-dot"></div>
                    <div class="today-meta">
                        <div class="today-day-label" id="banner-day-label">Today</div>
                        <div class="today-location" id="banner-location">—</div>
                    </div>
                </div>
                <div class="today-banner-right">
                    <div class="today-now" id="banner-now">
                        <span class="today-badge now-badge">NOW</span>
                        <span id="banner-now-text">—</span>
                    </div>
                    <div class="today-next" id="banner-next">
                        <span class="today-badge next-badge">NEXT</span>
                        <span id="banner-next-text">—</span>
                    </div>
                </div>
                <i class="fas fa-chevron-right today-arrow"></i>
            </div>
        </div>

        <main id="itinerary-container" class="itinerary-list">
            <!-- Days will be dynamically injected here -->
        </main>
    </div>

    <!-- Day Detail Modal -->
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Day Details</h2>
                <div class="modal-header-actions">
                    <button id="learn-more-btn" class="learn-more-btn" aria-label="Learn more about this area">
                        <i class="fas fa-globe"></i> Explore Area
                    </button>
                    <button class="close-btn" aria-label="Close modal">&times;</button>
                </div>
            </div>
            <div class="modal-scroll-area">
                <div id="modal-body" class="timeline">
                    <!-- Timeline items injected here -->
                </div>
                <!-- Rate & Notes Section -->
                <div class="day-rating-section">
                    <h4 class="rating-title"><i class="fas fa-star"></i> Rate This Day</h4>
                    <div class="star-rating" id="star-rating">
                        <button class="star-btn" data-value="1" aria-label="1 star">★</button>
                        <button class="star-btn" data-value="2" aria-label="2 stars">★</button>
                        <button class="star-btn" data-value="3" aria-label="3 stars">★</button>
                        <button class="star-btn" data-value="4" aria-label="4 stars">★</button>
                        <button class="star-btn" data-value="5" aria-label="5 stars">★</button>
                    </div>
                    <textarea id="day-notes" class="day-notes" placeholder="Add your notes, memories or tips for this day…" rows="3"></textarea>
                    <p class="notes-saved-indicator" id="notes-saved">✓ Saved</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Learn More Area Panel -->
    <div id="learn-more-panel" class="learn-more-panel">
        <div class="learn-more-content">
            <div class="learn-more-header">
                <button id="close-learn-more" class="close-learn-btn" aria-label="Close area info">&larr; Back</button>
                <h2 id="learn-more-title">Area Guide</h2>
            </div>
            <div id="learn-more-body" class="learn-more-body">
                <!-- Area content injected here -->
            </div>
        </div>
    </div>

    <!-- PDF Viewer Overlay -->
    <div id="pdf-overlay"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; background:#fff; flex-direction:column;">
        <div
            style="background:#1c2541; padding: 15px 20px; padding-top: max(15px, env(safe-area-inset-top)); display:flex; justify-content:space-between; align-items:center;">
            <span id="pdf-title" style="color:white; font-weight:bold; font-size:18px;">Document</span>
            <button id="close-pdf-btn"
                style="background:#3a506b; color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer;">Done</button>
        </div>
        <div style="flex:1; -webkit-overflow-scrolling: touch; overflow-y: auto;">
            <object id="pdf-object" style="width:100%; height:100%; min-height:100vh;" type="application/pdf"></object>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
