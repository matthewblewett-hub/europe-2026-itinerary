<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Europe 2026 Itinerary</title>
    <meta name="description" content="Interactive Itinerary for Europe 2026 Trip">

    <!-- Web App / PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EuroTrip">
    <link rel="apple-touch-icon" href="assets/app-icon.png">
    <meta name="theme-color" content="#0d1b2a" id="theme-color-meta">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>

<body>
    <div id="app">
        <header class="app-header">
            <div class="header-top-bar">
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle light/dark mode">
                    <i class="fas fa-sun" id="theme-icon"></i>
                </button>
                <button id="hof-btn" class="hof-header-btn" aria-label="Trip Sayings Hall of Fame">
                    🏆
                </button>
                <button id="tracker-btn" class="hof-header-btn" aria-label="Where is everyone" title="Where is everyone?">
                    📍
                </button>
            </div>
            <div class="header-content">
                <h1>Europe 2026</h1>
                <p>Our Journey Awaits</p>
            </div>
            <div class="header-bg"></div>
            <nav class="phase-tabs">
                <button class="phase-btn active" data-phase="phase1">Phase 1: Holland &amp; UK</button>
                <button class="phase-btn" data-phase="phase2">Phase 2: Cruise</button>
                <button class="phase-btn" data-phase="phase3">Phase 3: UK Camper</button>
            </nav>
        </header>

        <!-- Today Banner - shown when a day in the itinerary matches today -->
        <div id="today-banner" class="today-banner" style="display:none;" role="button" tabindex="0" aria-label="View today's itinerary">
            <div class="today-banner-inner">
                <div class="today-banner-left">
                    <div class="today-live-dot"></div>
                    <div class="today-meta">
                        <div class="today-day-label" id="banner-day-label">Today</div>
                        <div class="today-location" id="banner-location">—</div>
                    </div>
                </div>
                <div class="today-banner-right">
                    <div class="today-now" id="banner-now">
                        <span class="today-badge now-badge">NOW</span>
                        <span id="banner-now-text">—</span>
                    </div>
                    <div class="today-next" id="banner-next">
                        <span class="today-badge next-badge">NEXT</span>
                        <span id="banner-next-text">—</span>
                    </div>
                </div>
                <i class="fas fa-chevron-right today-arrow"></i>
            </div>
        </div>

        <main id="itinerary-container" class="itinerary-list">
            <!-- Days will be dynamically injected here -->
        </main>
    </div>

    <!-- Day Detail Modal -->
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Day Details</h2>
                <div class="modal-header-actions">
                    <button id="learn-more-btn" class="learn-more-btn" aria-label="Learn more about this area">
                        <i class="fas fa-globe"></i> Explore Area
                    </button>
                    <button class="close-btn" aria-label="Close modal">&times;</button>
                </div>
            </div>
            <div class="modal-scroll-area">
                <div id="modal-body" class="timeline">
                    <!-- Timeline items injected here -->
                </div>
                <!-- Rate & Notes Section -->
                <div class="day-rating-section">
                    <h4 class="rating-title"><i class="fas fa-star"></i> Rate This Day</h4>
                    <div class="star-rating" id="star-rating">
                        <span class="star" data-star="1">★</span>
                        <span class="star" data-star="2">★</span>
                        <span class="star" data-star="3">★</span>
                        <span class="star" data-star="4">★</span>
                        <span class="star" data-star="5">★</span>
                        <span class="star-rating-val" id="star-val"></span>
                    </div>
                    <textarea id="day-notes" class="day-notes" placeholder="Add your notes, memories or tips for this day…" rows="3"></textarea>
                    <p class="notes-saved-indicator" id="notes-saved">✓ Saved</p>
                </div>
                <!-- Sayings of the Day -->
                <div class="quotes-section">
                    <h4 class="rating-title"><i class="fas fa-quote-left"></i> Sayings of the Day</h4>
                    <div class="quotes-day-list" id="quotes-day-list"></div>
                    <div class="quote-input-area">
                        <textarea id="new-quote-text" class="day-notes" placeholder="A funny or memorable quote from today…" rows="2"></textarea>
                        <div class="quote-author-row">
                            <input type="text" id="new-quote-author" class="quote-author-input" placeholder="Who said it?">
                            <button id="save-quote-btn" class="save-quote-btn"><i class="fas fa-plus"></i> Save</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Learn More Area Panel -->
    <div id="learn-more-panel" class="learn-more-panel">
        <div class="learn-more-content">
            <div class="learn-more-header">
                <button id="close-learn-more" class="close-learn-btn" aria-label="Close area info">&larr; Back</button>
                <h2 id="learn-more-title">Area Guide</h2>
            </div>
            <div id="learn-more-body" class="learn-more-body">
                <!-- Area content injected here -->
            </div>
        </div>
    </div>

    <!-- PDF Viewer Overlay -->
    <div id="pdf-overlay"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; background:#fff; flex-direction:column;">
        <div
            style="background:#1c2541; padding: 15px 20px; padding-top: max(15px, env(safe-area-inset-top)); display:flex; justify-content:space-between; align-items:center;">
            <span id="pdf-title" style="color:white; font-weight:bold; font-size:18px;">Document</span>
            <button id="close-pdf-btn"
                style="background:#3a506b; color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer;">Done</button>
        </div>
        <div style="flex:1; -webkit-overflow-scrolling: touch; overflow-y: auto;">
            <object id="pdf-object" style="width:100%; height:100%; min-height:100vh;" type="application/pdf"></object>
        </div>
    </div>

    <!-- Hall of Fame Panel -->
    <div id="hof-panel" class="hof-panel">
        <div class="hof-content">
            <div class="hof-header-bar">
                <button id="close-hof" class="close-hof-btn">&#8592; Back</button>
                <h2>🏆 Trip Sayings</h2>
            </div>
            <div id="hof-body" class="hof-body"></div>
        </div>
    </div>

    <!-- Split Expense Tracker FAB -->
    <button id="split-fab" class="split-fab" aria-label="Open expense splitter">
        <i class="fas fa-receipt"></i>
    </button>

    <!-- Split Expense Panel -->
    <div id="split-panel" class="split-panel">
        <div class="split-content">
            <div class="split-header">
                <button id="close-split" class="close-split-btn">&#8592; Back</button>
                <h2>💰 Trip Expenses</h2>
                <button id="add-expense-btn" class="add-expense-fab-btn"><i class="fas fa-plus"></i> Add</button>
            </div>
            <div id="split-summary" class="split-summary"></div>
            <div id="split-list" class="split-list"></div>
        </div>
    </div>

    <!-- Add Expense Bottom Sheet -->
    <div id="add-expense-modal" class="add-expense-modal">
        <div class="add-expense-sheet">
            <div class="add-expense-handle"></div>
            <div class="add-expense-header">
                <h3>Add Expense</h3>
                <button id="close-add-expense" class="close-add-btn">&#10005;</button>
            </div>

            <label class="photo-capture-area" id="photo-capture-area" for="receipt-photo">
                <input type="file" accept="image/*" capture="environment" id="receipt-photo">
                <img id="receipt-preview" alt="Receipt preview">
                <div id="photo-placeholder" class="photo-placeholder">
                    <i class="fas fa-camera"></i>
                    <span>Tap to photograph receipt (optional)</span>
                </div>
            </label>

            <input type="text" id="expense-desc" class="expense-input" placeholder="What was this for? e.g. Fish & Chips">

            <!-- Split mode toggle -->
            <div class="split-mode-row">
                <span class="paid-by-label">Split</span>
                <div class="split-mode-toggle">
                    <button class="split-mode-btn active" id="split-equal-btn">50 : 50</button>
                    <button class="split-mode-btn" id="split-custom-btn">Custom</button>
                </div>
            </div>
            <div id="equal-split-section">
                <div class="amount-row">
                    <span class="currency-symbol">&pound;</span>
                    <input type="number" id="expense-total" class="expense-input amount-input" placeholder="Total amount" step="0.01" min="0">
                </div>
            </div>
            <div id="custom-split-section" style="display:none">
                <div class="custom-split-row">
                    <div class="custom-split-col">
                        <label class="split-col-label">&#128309; Blues &pound;</label>
                        <input type="number" id="expense-blues" class="expense-input" placeholder="0.00" step="0.01" min="0">
                    </div>
                    <div class="custom-split-col">
                        <label class="split-col-label">&#128993; Oosties &pound;</label>
                        <input type="number" id="expense-oosties" class="expense-input" placeholder="0.00" step="0.01" min="0">
                    </div>
                </div>
                <div class="custom-total-preview" id="custom-total-preview">Total: &pound;0.00</div>
            </div>

            <div class="paid-by-row">
                <span class="paid-by-label">Who paid?</span>
                <div class="paid-by-toggle">
                    <button class="paid-btn" data-team="blues" id="btn-blues">🔵 Blues</button>
                    <button class="paid-btn" data-team="oosties" id="btn-oosties">🟡 Oosties</button>
                </div>
            </div>

            <select id="expense-category" class="expense-input expense-select">
                <option value="food">🍽️ Food &amp; Drink</option>
                <option value="activity">🎯 Activity / Entry</option>
                <option value="fuel">⛽ Fuel</option>
                <option value="accommodation">🏕️ Accommodation</option>
                <option value="transport">🚌 Transport</option>
                <option value="shopping">🛍️ Shopping</option>
                <option value="other">📦 Other</option>
            </select>

            <button id="save-expense-btn" class="save-expense-btn">Add Expense</button>
        </div>
    </div>

    <!-- Group Location Tracker Panel -->
    <div id="tracker-panel" class="hof-panel">
        <div class="hof-content">
            <div class="hof-header-bar">
                <button id="close-tracker" class="close-hof-btn">&larr; Back</button>
                <h2>&#128205; Where Is Everyone?</h2>
            </div>
            <div class="hof-body" style="padding:0;display:flex;flex-direction:column;overflow:hidden">
                <!-- Live Map -->
                <div id="tracker-map" style="height:280px;flex-shrink:0;z-index:1"></div>

                <!-- Share card -->
                <div style="flex:1;overflow-y:auto;padding-bottom:30px">
                    <div class="tracker-share-card">
                        <div class="tracker-name-row">
                            <input type="text" id="tracker-name" class="expense-input" placeholder="Your name (e.g. Matt)" style="margin-bottom:0;flex:1">
                            <button id="share-location-btn" class="save-expense-btn" style="width:auto;padding:12px 16px;white-space:nowrap;margin-top:0">
                                <i class="fas fa-map-marker-alt"></i> Share My Location
                            </button>
                        </div>
                        <div id="tracker-status" class="tracker-status"></div>
                    </div>
                    <h4 class="rating-title" style="margin:12px 16px 8px"><i class="fas fa-users"></i> Group Locations</h4>
                    <div id="tracker-list"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script src="expenses.js"></script>
    <script src="quotes.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="tracker.js"></script>
</body>

</html>
